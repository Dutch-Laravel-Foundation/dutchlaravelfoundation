<!doctype html>
<html lang="nl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DLF Featured Image — Brand Poster</title>
        <style>
            @font-face {
                font-family: "Mulish";
                font-style: normal;
                font-weight: 200 1000;
                src: url("/build/assets/mulish-latin-wght-normal-WL5YNY-W.woff2") format("woff2");
            }

            @font-face {
                font-family: "JetBrains Mono";
                font-style: normal;
                font-weight: 100 800;
                src: url("/build/assets/jetbrains-mono-latin-wght-normal-B9CIFXIH.woff2")
                    format("woff2");
            }

            :root {
                color-scheme: light;
                font-family: "Mulish", sans-serif;
                background: #d8d8dc;
            }

            * {
                box-sizing: border-box;
            }

            body {
                min-width: 1200px;
                min-height: 630px;
                margin: 0;
                display: grid;
                place-items: center;
            }

            .canvas {
                position: relative;
                display: grid;
                width: 1200px;
                height: 630px;
                grid-template-columns: 1fr 338px;
                grid-template-rows: 1fr 76px;
                overflow: hidden;
                background:
                    repeating-linear-gradient(
                        135deg,
                        rgba(255, 255, 255, 0.09) 0,
                        rgba(255, 255, 255, 0.09) 1px,
                        transparent 1px,
                        transparent 9px
                    ),
                    #ff2d20;
                color: #fff;
            }

            .message {
                display: flex;
                min-width: 0;
                flex-direction: column;
                padding: 44px 54px 38px;
            }

            .topline {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
            }

            .brand {
                width: 204px;
                height: auto;
                display: block;
            }

            .meta {
                margin: 3px 0 0;
                font-family: "JetBrains Mono", monospace;
                font-size: 12px;
                font-weight: 500;
                letter-spacing: 0.14em;
                line-height: 1.5;
                text-align: right;
                text-transform: uppercase;
            }

            .eyebrow {
                margin: auto 0 16px;
                font-family: "JetBrains Mono", monospace;
                font-size: 14px;
                font-weight: 500;
                letter-spacing: 0.2em;
                text-transform: uppercase;
            }

            h1 {
                max-width: 760px;
                margin: 0;
                font-size: 70px;
                font-weight: 520;
                letter-spacing: -0.05em;
                line-height: 0.96;
            }

            .monogram {
                position: relative;
                display: flex;
                overflow: hidden;
                flex-direction: column;
                justify-content: space-between;
                padding: 42px 34px 36px;
                border-left: 1px solid rgba(255, 255, 255, 0.65);
                background: #090910;
            }

            .monogram::before {
                position: absolute;
                inset: 0;
                background: repeating-linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.075) 0,
                    rgba(255, 255, 255, 0.075) 1px,
                    transparent 1px,
                    transparent 9px
                );
                content: "";
            }

            .braces,
            .country,
            .vertical-label {
                position: relative;
                z-index: 1;
            }

            .braces {
                margin: 0;
                color: #ff2d20;
                font-family: "JetBrains Mono", monospace;
                font-size: 30px;
                font-weight: 500;
                letter-spacing: 0.06em;
            }

            .country {
                margin: auto 0;
                color: #fff;
                font-size: 168px;
                font-weight: 480;
                letter-spacing: -0.105em;
                line-height: 0.78;
                transform: translateX(-10px);
            }

            .vertical-label {
                position: absolute;
                right: 21px;
                bottom: 37px;
                margin: 0;
                color: rgba(255, 255, 255, 0.7);
                font-family: "JetBrains Mono", monospace;
                font-size: 11px;
                font-weight: 500;
                letter-spacing: 0.17em;
                text-transform: uppercase;
                writing-mode: vertical-rl;
            }

            .footer {
                z-index: 2;
                display: flex;
                grid-column: 1 / -1;
                align-items: center;
                justify-content: space-between;
                padding: 0 54px;
                border-top: 1px solid #090910;
                background: #fff;
                color: #090910;
            }

            .footer ul {
                display: flex;
                gap: 32px;
                margin: 0;
                padding: 0;
                font-family: "JetBrains Mono", monospace;
                font-size: 12px;
                font-weight: 500;
                letter-spacing: 0.15em;
                list-style: none;
                text-transform: uppercase;
            }

            .footer p {
                margin: 0;
                font-size: 18px;
                font-weight: 520;
                letter-spacing: -0.02em;
            }
        </style>
    </head>
    <body>
        <main class="canvas" aria-label="Featured image concept: graphic brand poster">
            <section class="message">
                <div class="topline">
                    <img
                        class="brand"
                        src="/assets/redesign/logo-2025.svg"
                        alt="Dutch Laravel Foundation"
                    />
                    <p class="meta">Nederland<br />Sinds 2020</p>
                </div>
                <p class="eyebrow">De kracht van de community</p>
                <h1>Samen bouwen aan Laravel.</h1>
            </section>
            <aside class="monogram" aria-label="Nederlandse Laravel-community">
                <p class="braces">{ dlf }</p>
                <p class="country">NL</p>
                <p class="vertical-label">Dutch Laravel Foundation</p>
            </aside>
            <footer class="footer">
                <ul aria-label="Thema's">
                    <li>Kennis</li>
                    <li>Community</li>
                    <li>Groei</li>
                </ul>
                <p>dutchlaravelfoundation.nl →</p>
            </footer>
        </main>
    </body>
</html>
