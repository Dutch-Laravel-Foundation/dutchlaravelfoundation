title: 'DLF Prijsblokken'
fields:
  -
    handle: eyebrow
    field:
      display: Bovenregel
      type: text
  -
    handle: heading
    field:
      display: Kop
      type: text
      validate:
        - required
  -
    handle: introduction
    field:
      display: Introductie
      type: bard
      remove_empty_nodes: true
  -
    handle: plans
    field:
      display: Prijsblokken
      type: grid
      mode: stacked
      reorderable: true
      add_row: 'Prijsblok toevoegen'
      fields:
        -
          handle: name
          field:
            display: Naam
            type: text
            validate:
              - required
        -
          handle: price
          field:
            display: Prijs
            type: text
        -
          handle: suffix
          field:
            display: Prijstoelichting
            type: text
        -
          handle: description
          field:
            display: Omschrijving
            type: markdown
        -
          handle: features
          field:
            display: Kenmerken
            type: grid
            mode: table
            reorderable: true
            add_row: 'Kenmerk toevoegen'
            fields:
              -
                handle: feature
                field:
                  display: Kenmerk
                  type: text
                  validate:
                    - required
        -
          handle: button_label
          field:
            display: Knoptekst
            type: text
        -
          handle: button_link
          field:
            display: Knoplink
            type: link
        -
          handle: featured
          field:
            display: Uitgelicht
            type: toggle
