title: 'DLF Kaarten'
fields:
  -
    handle: eyebrow
    field:
      display: Bovenregel
      type: text
  -
    handle: heading
    field:
      display: Kop
      type: text
      validate:
        - required
  -
    handle: introduction
    field:
      display: Introductie
      type: bard
      remove_empty_nodes: true
  -
    handle: cards
    field:
      display: Kaarten
      type: grid
      mode: stacked
      reorderable: true
      add_row: 'Kaart toevoegen'
      fields:
        -
          handle: image
          field:
            display: Afbeelding
            type: assets
            container: assets
            mode: grid
            max_files: 1
        -
          handle: eyebrow
          field:
            display: Bovenregel
            type: text
        -
          handle: heading
          field:
            display: Kop
            type: text
            validate:
              - required
        -
          handle: body
          field:
            display: Tekst
            type: markdown
        -
          handle: link_label
          field:
            display: Linktekst
            type: text
        -
          handle: link
          field:
            display: Link
            type: link
