title: 'DLF Statistieken'
fields:
  -
    handle: eyebrow
    field:
      display: Bovenregel
      type: text
  -
    handle: heading
    field:
      display: Kop
      type: text
      validate:
        - required
  -
    handle: introduction
    field:
      display: Introductie
      type: bard
      remove_empty_nodes: true
  -
    handle: stats
    field:
      display: Statistieken
      type: grid
      mode: stacked
      reorderable: true
      add_row: 'Statistiek toevoegen'
      fields:
        -
          handle: value
          field:
            display: Waarde
            type: text
            validate:
              - required
        -
          handle: label
          field:
            display: Omschrijving
            type: text
            validate:
              - required
        -
          handle: context
          field:
            display: Toelichting
            type: textarea
