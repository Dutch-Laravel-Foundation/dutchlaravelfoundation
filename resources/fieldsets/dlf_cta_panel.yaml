title: 'DLF Call to action'
fields:
  -
    handle: eyebrow
    field:
      display: Bovenregel
      type: text
  -
    handle: heading
    field:
      display: Kop
      type: text
      validate:
        - required
  -
    handle: body
    field:
      display: Tekst
      type: bard
      remove_empty_nodes: true
  -
    handle: primary_label
    field:
      display: 'Primaire knoptekst'
      type: text
  -
    handle: primary_link
    field:
      display: 'Primaire knoplink'
      type: link
  -
    handle: secondary_label
    field:
      display: 'Secundaire knoptekst'
      type: text
  -
    handle: secondary_link
    field:
      display: 'Secundaire knoplink'
      type: link
  -
    handle: tone
    field:
      display: Achtergrond
      type: select
      default: red
      options:
        red: Rood
        dark: Donker
        soft: Lichtgrijs
