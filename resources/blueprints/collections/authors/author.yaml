title: Auteur
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
              display: Naam
          -
            handle: job_title
            field:
              display: Functietitel
              type: text
          -
            handle: photo
            field:
              mode: grid
              container: insights
              max_files: 1
              display: Foto
              type: assets
          -
            handle: photo_url
            field:
              display: 'Foto URL'
              type: text
          -
            handle: description
            field:
              display: Beschrijving
              type: markdown
              container: insights
          -
            handle: linkedin_url
            field:
              display: LinkedIn
              type: link
          -
            handle: website_url
            field:
              display: Website
              type: link
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
