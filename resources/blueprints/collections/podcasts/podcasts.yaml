title: Podcasts
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
              display: Titel
          -
            handle: summary
            field:
              display: 'Korte omschrijving'
              instructions: 'Gebruik maximaal twee zinnen voor overzichtspagina’s.'
              type: textarea
              required: true
              validate:
                - required
          -
            handle: description
            field:
              display: 'Volledige omschrijving'
              type: markdown
              container: assets
              required: true
              validate:
                - required
          -
            handle: video_url
            field:
              display: Video URL
              type: video
              required: true
              validate:
                - required
          -
            handle: spotify_url
            field:
              display: Spotify URL
              type: text
              required: true
              validate:
                - required
                - url
          -
            handle: thumbnail_url
            field:
              display: 'YouTube cover URL'
              type: text
              required: true
              validate:
                - required
                - url
          -
            handle: transcript
            field:
              display: Transcript
              type: markdown
              container: assets
              required: true
              validate:
                - required
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: date
            field:
              type: date
              display: Datum
              required: true
              default: now
              validate:
                - required
          -
            handle: published_at
            field:
              type: date
              display: Publicatietijd
              time_enabled: true
              required: true
              default: now
              validate:
                - required
          -
            handle: call_to_action
            field:
              max_items: 1
              mode: select
              collections:
                - cta
              display: 'Call to action'
              type: entries
              instructions: 'Shown above the footer on podcast detail pages.'
  seo:
    display: SEO
    sections:
      -
        fields:
          -
            import: seo
