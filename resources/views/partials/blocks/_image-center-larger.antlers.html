<div
    class="block-image-center-larger relative flex flex-row justify-center w-full pt-64 mb-10 md:mb-20 {{ class }}" data-progressive-media-frame>
    {{ if image }}
        <img class="absolute top-0 left-0 object-cover w-full h-96" style="object-position:{{ featured_image:focus_css }}"
            src="{{ glide src="{featured_image}" fit="crop_focal" width="1280" format="webp" quality="82" }}" alt="{{ featured_image:alt ?? title }}" {{ partial:progressive_media_attributes :width="featured_image:width" :height="featured_image:height" }}>
    {{ /if }}
    {{ partial:blocks/base class="relative z-10 w-5/6 md:w-2/3 mx-auto pb-16!" }}
        {{ slot }}
        {{ partial:buttons/more :link="link" class="" button_class="" background_class="" }}
    {{ /partial:blocks/base }}
</div>
