<section
    class="dlf-tracking-consent"
    data-tracking-consent-banner
    aria-labelledby="tracking-consent-title"
    tabindex="-1"
    hidden
>
    <div class="dlf-tracking-consent__inner">
        <div class="dlf-tracking-consent__copy">
            <span class="dlf-tracking-consent__eyebrow">Cookies &amp; privacy</span>
            <h2 id="tracking-consent-title">Kies voor een optimale ervaring</h2>
            <p>
                We gebruiken externe tools om jouw ervaring op onze website te verbeteren. Lees meer
                in onze
                <a href="/privacy-statement">privacy- en cookieverklaring</a>.
            </p>
        </div>

        <div class="dlf-tracking-consent__actions">
            <button
                class="dlf-btn dlf-tracking-consent__button dlf-tracking-consent__button--accept"
                type="button"
                data-tracking-consent-accept
            >
                <span class="dlf-btn-face dlf-btn-face--red">Accepteren</span>
                <span class="dlf-btn-shadow dlf-btn-shadow--red" aria-hidden="true"></span>
            </button>
            <button
                class="dlf-btn dlf-tracking-consent__button dlf-tracking-consent__button--reject"
                type="button"
                data-tracking-consent-reject
                aria-label="Doorgaan zonder tracking"
            >
                <span class="dlf-btn-face dlf-btn-face--outline-white">
                    <svg
                        class="dlf-tracking-consent__reject-icon"
                        viewBox="0 0 16 16"
                        aria-hidden="true"
                    >
                        <path d="m3 3 10 10M13 3 3 13" />
                    </svg>
                </span>
                <span class="dlf-btn-shadow dlf-btn-shadow--white" aria-hidden="true"></span>
            </button>
        </div>
    </div>
</section>
