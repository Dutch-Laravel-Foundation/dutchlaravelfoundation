<figure class="dlf-block dlf-quote dlf-block--{{ tone ?? 'soft' }}">
    {{ if image }}
        <span class="dlf-quote__media" data-progressive-media-frame>
            <img src="{{ glide src="{image}" fit="crop_focal" width="640" height="640" format="webp" quality="82" }}" alt="{{ image:alt ?? name }}" style="object-position: {{ image:focus_css }}" {{ partial:progressive_media_attributes width="640" height="640" }}>
        </span>
    {{ /if }}
    <div>
        <blockquote>“{{ quote }}”</blockquote>
        {{ if name || role }}
            <figcaption>
                {{ if name }}<strong>{{ name }}</strong>{{ /if }}
                {{ if role }}<span>{{ role }}</span>{{ /if }}
            </figcaption>
        {{ /if }}
    </div>
</figure>
