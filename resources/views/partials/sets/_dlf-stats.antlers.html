<section class="dlf-block dlf-block-stats">
    <header class="dlf-block-heading">
        {{ if eyebrow }}<p class="dlf-kicker">{{ eyebrow }}</p>{{ /if }}
        <h2>{{ heading }}</h2>
        {{ if introduction }}<div class="dlf-prose">{{ introduction }}</div>{{ /if }}
    </header>
    <div class="dlf-stats-grid">
        {{ stats }}
            <article class="dlf-stat">
                <strong>{{ value }}</strong>
                <h3>{{ label }}</h3>
                {{ if context }}<p>{{ context }}</p>{{ /if }}
            </article>
        {{ /stats }}
    </div>
</section>
