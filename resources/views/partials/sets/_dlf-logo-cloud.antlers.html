<section class="dlf-block dlf-block-logos">
    <h2>{{ heading }}</h2>
    <div class="dlf-logo-grid">
        {{ logos }}
            {{ if link }}<a class="dlf-logo-cell" href="{{ link }}" aria-label="{{ name }}">{{ else }}<div class="dlf-logo-cell">{{ /if }}
                <img src="{{ logo }}" alt="{{ name }}">
            {{ if link }}</a>{{ else }}</div>{{ /if }}
        {{ /logos }}
    </div>
</section>
