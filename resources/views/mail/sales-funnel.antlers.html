<h1>Nieuwe lead via Sales Funnel</h1>

<table cellpadding="8" cellspacing="0" style="border-collapse: collapse; width: 100%;">
    <tr>
        <td style="border-bottom: 1px solid #eee;"><strong>Product</strong></td>
        <td style="border-bottom: 1px solid #eee;">{{ product_label }}</td>
    </tr>
    <tr>
        <td style="border-bottom: 1px solid #eee;"><strong>Omschrijving</strong></td>
        <td style="border-bottom: 1px solid #eee;">{{ description }}</td>
    </tr>
    <tr>
        <td style="border-bottom: 1px solid #eee;"><strong>Budget</strong></td>
        <td style="border-bottom: 1px solid #eee;">{{ budget }}</td>
    </tr>
    <tr>
        <td style="border-bottom: 1px solid #eee;"><strong>Voorkeur bedrijfstype</strong></td>
        <td style="border-bottom: 1px solid #eee;">{{ company_type }}</td>
    </tr>
    <tr>
        <td style="border-bottom: 1px solid #eee;"><strong>E-mailadres</strong></td>
        <td style="border-bottom: 1px solid #eee;">{{ email }}</td>
    </tr>
</table>
