<div class="editorial-article editorial-article--podcast">
    <div class="editorial-rail editorial-rail--article" data-dlf-footer-cta-stage>
        {{ partial:breadcrumb href="/podcast" label="Podcast" current="Aflevering" }}

        <header
            class="editorial-article__hero dlf-divider-section dlf-divider-split dlf-divider-split--stacked-reversed"
        >
            <div class="editorial-article__head">
                <div class="editorial-entry__meta editorial-article__meta">
                    <span class="editorial-entry__category">Podcast</span>
                    {{ if published_at }}
                        <span class="editorial-entry__dot" aria-hidden="true">·</span>
                        <time datetime="{{ published_at format="Y-m-d" }}">{{ published_at | iso_format="D MMMM YYYY" }}</time>
                    {{ /if }}
                </div>
                <h1>{{ title }}</h1>
                {{ if summary }}
                    <p class="editorial-article__lead">{{ summary }}</p>
                {{ /if }}
            </div>

            <figure class="editorial-article__figure editorial-podcast__media">
                {{ if video_url | is_embeddable }}
                    <iframe
                        src="{{ video_url | embed_url }}"
                        title="{{ title }}"
                        referrerpolicy="strict-origin-when-cross-origin"
                        allow="autoplay; fullscreen; picture-in-picture; clipboard-write"
                        allowfullscreen
                    ></iframe>
                {{ else }}
                    <video src="{{ video_url | embed_url }}" controls preload="metadata" aria-label="{{ title }}"></video>
                {{ /if }}
            </figure>
        </header>

        <div class="editorial-article__body editorial-podcast__body dlf-divider-section">
            <article
                class="editorial-article__prose editorial-podcast__content"
                x-data="{ activeTab: 'description' }"
                data-editorial-prose
            >
                <div class="editorial-podcast__actions" aria-label="Podcastkanalen">
                    <a class="dlf-btn" href="{{ video_url }}" target="_blank" rel="noopener noreferrer">
                        <span class="dlf-btn-face dlf-btn-face--red">
                            <svg class="dlf-btn-icon" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2 31.4 31.4 0 0 0 0 12a31.4 31.4 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1A31.4 31.4 0 0 0 24 12a31.4 31.4 0 0 0-.5-5.8ZM9.6 15.6V8.4L15.8 12l-6.2 3.6Z" />
                            </svg>
                            Bekijk op YouTube
                        </span>
                        <span class="dlf-btn-shadow dlf-btn-shadow--red" aria-hidden="true"></span>
                    </a>
                    <a class="dlf-btn" href="{{ spotify_url }}" target="_blank" rel="noopener noreferrer">
                        <span class="dlf-btn-face dlf-btn-face--spotify">
                            <svg class="dlf-btn-icon" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 0a12 12 0 1 0 0 24 12 12 0 0 0 0-24Zm5.5 17.3a.75.75 0 0 1-1 .25c-2.8-1.7-6.3-2.1-10.4-1.15a.75.75 0 1 1-.34-1.46c4.5-1.03 8.4-.56 11.5 1.35.36.22.47.68.24 1.01Zm1.47-3.27a.94.94 0 0 1-1.29.31c-3.2-1.97-8.1-2.54-11.9-1.39a.94.94 0 0 1-.55-1.8c4.35-1.32 9.75-.68 13.43 1.58.44.27.58.85.3 1.3Zm.13-3.4C15.25 8.35 8.9 8.13 5.23 9.25a1.13 1.13 0 1 1-.66-2.16c4.22-1.29 11.25-1.03 15.68 1.6a1.13 1.13 0 0 1-1.15 1.94Z" />
                            </svg>
                            Luister op Spotify
                        </span>
                        <span class="dlf-btn-shadow dlf-btn-shadow--spotify" aria-hidden="true"></span>
                    </a>
                </div>

                <div class="editorial-podcast__tabs" role="tablist" aria-label="Inhoud aflevering">
                    <button
                        id="podcast-description-tab"
                        type="button"
                        role="tab"
                        aria-controls="podcast-description-panel"
                        :aria-selected="(activeTab === 'description').toString()"
                        :tabindex="activeTab === 'description' ? 0 : -1"
                        :class="{ 'is-active': activeTab === 'description' }"
                        x-ref="descriptionTab"
                        @click="activeTab = 'description'"
                        @keydown.right.prevent="activeTab = 'transcript'; $nextTick(() => $refs.transcriptTab.focus())"
                        @keydown.end.prevent="activeTab = 'transcript'; $nextTick(() => $refs.transcriptTab.focus())"
                    >Samenvatting</button>
                    <button
                        id="podcast-transcript-tab"
                        type="button"
                        role="tab"
                        aria-controls="podcast-transcript-panel"
                        :aria-selected="(activeTab === 'transcript').toString()"
                        :tabindex="activeTab === 'transcript' ? 0 : -1"
                        :class="{ 'is-active': activeTab === 'transcript' }"
                        x-ref="transcriptTab"
                        @click="activeTab = 'transcript'"
                        @keydown.left.prevent="activeTab = 'description'; $nextTick(() => $refs.descriptionTab.focus())"
                        @keydown.home.prevent="activeTab = 'description'; $nextTick(() => $refs.descriptionTab.focus())"
                    >Transcript</button>
                </div>

                <section
                    id="podcast-description-panel"
                    role="tabpanel"
                    aria-labelledby="podcast-description-tab"
                    x-show="activeTab === 'description'"
                >
                    {{ description }}
                </section>

                <section
                    id="podcast-transcript-panel"
                    role="tabpanel"
                    aria-labelledby="podcast-transcript-tab"
                    x-show="activeTab === 'transcript'"
                    x-cloak
                >
                    {{ transcript }}
                </section>
            </article>
        </div>
    </div>
</div>
