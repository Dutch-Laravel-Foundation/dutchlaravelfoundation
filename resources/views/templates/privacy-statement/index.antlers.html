<div class="dlf-public-page dlf-public-page--legal editorial-article">
    <div class="editorial-rail editorial-rail--article">
        <header class="dlf-public-page__hero">
            <span class="editorial-eyebrow">Juridisch</span>
            <h1>{{ title }}</h1>
        </header>

        <div class="editorial-article__body dlf-public-page__body" data-editorial-article>
            {{ partial:editorial/toc label="In deze verklaring" }}

            <article class="editorial-article__prose dlf-public-page__prose" data-editorial-prose>
                {{ content }}
                    {{ partial src="sets/autoload" }}
                {{ /content }}

                <aside class="dlf-public-contact-card" aria-label="Contactgegevens Dutch Laravel Foundation">
                    <span class="editorial-eyebrow">Contact</span>
                    <h2>{{ dlf:title }}</h2>
                    <p>{{ dlf:address }}<br>{{ dlf:zipcode }} {{ dlf:city }}</p>
                    <p>
                        <a href="tel:{{ dlf:phone regex_replace="\(0\)|" regex_replace="[^+0-9]|" }}">{{ dlf:phone }}</a><br>
                        <a href="mailto:{{ dlf:email }}">{{ dlf:email }}</a>
                    </p>
                    <p>KVK: {{ dlf:coc }}</p>
                </aside>
            </article>
        </div>
    </div>
</div>
