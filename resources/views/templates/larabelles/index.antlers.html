<div class="dlf-public-page dlf-public-page--larabelles editorial-article">
    <div class="editorial-rail editorial-rail--article" data-dlf-footer-cta-stage>
        <header
            class="dlf-public-page__hero dlf-public-page__hero--split dlf-divider-section"
        >
            <div>
                <span class="editorial-eyebrow">Community</span>
                <h1>{{ title }}</h1>
                <p>Een internationale community die vrouwelijke Laravel-developers met elkaar verbindt, ondersteunt en zichtbaar maakt.</p>
            </div>
            <img src="/assets/img/larabelles.png" alt="Larabelles" width="320" height="120">
        </header>

        <div
            class="editorial-article__body dlf-public-page__body dlf-divider-section"
            data-editorial-article
        >
            {{ partial:editorial/toc label="Op deze pagina" }}

            <article class="editorial-article__prose dlf-public-page__prose" data-editorial-prose>
                {{ content }}
                    {{ partial src="sets/autoload" }}
                {{ /content }}

                <figure class="dlf-larabelles-mission" data-progressive-media-frame>
                    <img src="/assets/img/larabelles-mission.png" alt="Our Mission – Elevating Our Community, Connecting and Engaging, Resource Sharing" {{ partial:progressive_media_attributes width="1024" height="369" }}>
                </figure>

                <div class="dlf-public-actions">
                    <a class="dlf-btn" href="https://www.larabelles.com/" target="_blank" rel="noopener noreferrer">
                        <span class="dlf-btn-face dlf-btn-face--red">Sluit je aan bij de Larabelles</span>
                        <span class="dlf-btn-shadow dlf-btn-shadow--red" aria-hidden="true"></span>
                    </a>
                </div>
            </article>
        </div>
    </div>
</div>
