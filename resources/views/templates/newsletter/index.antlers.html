<div class="dlf-public-page dlf-public-page--success editorial-article">
    <div class="editorial-rail editorial-rail--article" data-dlf-footer-cta-stage>
        <section class="dlf-divider-section">
            <div class="dlf-public-success">
                <span class="dlf-public-success__mark" aria-hidden="true">✓</span>
                <span class="editorial-eyebrow">Nieuwsbrief</span>
                <div class="editorial-article__prose dlf-public-page__prose">
                    {{ content }}
                        {{ partial src="sets/autoload" }}
                    {{ /content }}
                </div>
                <div class="dlf-public-actions">
                    <a class="dlf-btn" href="/agenda">
                        <span class="dlf-btn-face dlf-btn-face--red">Bekijk onze agenda</span>
                        <span class="dlf-btn-shadow dlf-btn-shadow--red" aria-hidden="true"></span>
                    </a>
                    <a class="dlf-btn" href="/over-ons">
                        <span class="dlf-btn-face dlf-btn-face--outline-red">Lees meer over ons</span>
                        <span class="dlf-btn-shadow dlf-btn-shadow--red" aria-hidden="true"></span>
                    </a>
                </div>
            </div>
        </section>
    </div>
</div>
